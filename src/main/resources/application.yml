spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: collabkart-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/collabKartdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:abc@1234}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: ${PORT:${SERVER_PORT:8080}}
  address: 0.0.0.0

app:
  jwt:
    secret: ${JWT_SECRET:collabkart-local-dev-secret-key-change-before-production-123456}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  dev-admin:
    email: ${DEV_ADMIN_EMAIL:admin@collabkart.local}
    password: ${DEV_ADMIN_PASSWORD:Admin@12345}
    name: ${DEV_ADMIN_NAME:Dev Admin}

  upload:
    base-dir: ${APP_UPLOAD_DIR:uploads}
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
